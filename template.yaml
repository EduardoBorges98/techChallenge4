AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: >
  Plataforma serverless para recebimento e análise de avaliações.

Parameters:
  AdminEmail:
    Type: String
    Description: Email que receberá alertas de avaliações críticas
    NoEcho: true

Globals:
  Function:
    Runtime: java21
    Architectures:
      - x86_64
    Timeout: 30
    MemorySize: 1024
    LoggingConfig:
      LogFormat: JSON

Resources:

  AvaliacoesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: feedback-avaliacoes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true

  AvaliacoesCriticasTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: feedback-avaliacoes-criticas

  AvaliacoesCriticasEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref AdminEmail
      TopicArn: !Ref AvaliacoesCriticasTopic

  RelatoriosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  ReceberAvaliacaoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: feedback-receber-avaliacao
      CodeUri: ReceberAvaliacaoFunction
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest

      Environment:
        Variables:
          MAIN_CLASS: br.com.techchallenge.feedback.FeedbackApplication
          SPRING_CLOUD_FUNCTION_DEFINITION: receberAvaliacao
          AVALIACOES_TABLE_NAME: !Ref AvaliacoesTable
          SNS_TOPIC_ARN: !Ref AvaliacoesCriticasTopic

      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref AvaliacoesTable

        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AvaliacoesCriticasTopic.TopicName

      Events:
        ReceberAvaliacaoApi:
          Type: Api
          Properties:
            Path: /avaliacoes
            Method: post

        ReceberAvaliacaoApiAlternativa:
          Type: Api
          Properties:
            Path: /avaliacao
            Method: post

  GerarRelatorioFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: feedback-gerar-relatorio
      CodeUri: GerarRelatorioFunction
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest

      Environment:
        Variables:
          MAIN_CLASS: br.com.techchallenge.feedback.relatorio.RelatorioApplication
          SPRING_CLOUD_FUNCTION_DEFINITION: gerarRelatorio
          AVALIACOES_TABLE_NAME: !Ref AvaliacoesTable
          RELATORIOS_BUCKET_NAME: !Ref RelatoriosBucket
          SNS_TOPIC_ARN: !Ref AvaliacoesCriticasTopic

      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AvaliacoesTable

        - S3WritePolicy:
            BucketName: !Ref RelatoriosBucket

        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AvaliacoesCriticasTopic.TopicName

      Events:
        RelatorioSemanal:
          Type: Schedule
          Properties:
            Description: Gera o relatório semanal de avaliações
            Schedule: cron(0 12 ? * MON *)
            Enabled: true

  ReceberAvaliacaoErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: feedback-receber-avaliacao-errors
      AlarmDescription: Alarme para erros na função de recebimento de avaliações
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ReceberAvaliacaoFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AvaliacoesCriticasTopic

  GerarRelatorioErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: feedback-gerar-relatorio-errors
      AlarmDescription: Alarme para erros na função de geração de relatórios
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref GerarRelatorioFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AvaliacoesCriticasTopic

Outputs:

  AvaliacaoApiUrl:
    Description: Endpoint principal para envio de avaliações
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/avaliacoes"

  AvaliacaoApiAlternativaUrl:
    Description: Endpoint alternativo compatível com o enunciado
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/avaliacao"

  AvaliacoesTableName:
    Description: Nome da tabela de avaliações
    Value: !Ref AvaliacoesTable

  AvaliacoesCriticasTopicArn:
    Description: ARN do tópico de alertas críticos
    Value: !Ref AvaliacoesCriticasTopic

  RelatoriosBucketName:
    Description: Bucket onde os relatórios são armazenados
    Value: !Ref RelatoriosBucket

  ReceberAvaliacaoFunctionArn:
    Description: ARN da função de recebimento
    Value: !GetAtt ReceberAvaliacaoFunction.Arn

  GerarRelatorioFunctionArn:
    Description: ARN da função de geração de relatórios
    Value: !GetAtt GerarRelatorioFunction.Arn

  ReceberAvaliacaoErrorsAlarmName:
    Description: Alarme de erros da função de recebimento
    Value: !Ref ReceberAvaliacaoErrorsAlarm

  GerarRelatorioErrorsAlarmName:
    Description: Alarme de erros da função de relatório
    Value: !Ref GerarRelatorioErrorsAlarm